<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Portal | Festival GA 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        .admin-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .admin-wide-container {
            width: 100%;
            max-width: 1200px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem;
            min-height: 60vh;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 3rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            font-family: var(--font-logo);
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            padding: 1.5rem 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        td {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: #ddd;
        }
        .status-pill {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: var(--accent-gold);
            color: #000;
            font-weight: 900;
            font-size: 0.65rem;
            border-radius: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="admin-page">
    <div id="loader" class="loader" style="display:none;"></div>

    <div class="background-scene">
        <img src="70coração.png" class="heart-70-bg" alt="70 Anos Eurovisão" style="opacity: 0.05;">
        <div class="vienna-pattern"></div>
    </div>

    <!-- Login Portal -->
    <div id="login-section" class="glass-card" style="display: none;">
        <img src="logo-grupo-armindo.png" alt="Grupo Armindo" style="height: 40px; margin-bottom: 2rem;">
        <h2 class="form-title">Portal de Gestão</h2>
        <form id="login-form" class="registration-form">
            <div class="input-block">
                <input type="password" id="admin-password" class="input-field" placeholder="SENHA DE ACESSO" required>
            </div>
            <button type="submit" class="submit-btn">ENTRAR</button>
        </form>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="admin-wide-container" style="display: none;">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2rem;">
            <img src="70coração.png" alt="Festival GA da Canção" style="height: 50px;">
            <button onclick="logout()" class="legal-link" style="background: none; border: 1px solid #444; padding: 0.5rem 1.5rem; cursor: pointer;">SAIR</button>
        </header>

        <div class="table-responsive">
            <!-- Registration Control Section -->
            <div class="control-section" style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                <h3 style="color: var(--accent-gold); margin-bottom: 1.5rem; text-align: center;">📅 Gestão de Datas</h3>
                
                <!-- Status Display -->
                <div id="registration-status" style="margin-bottom: 2rem; padding: 1rem; border-radius: 8px; text-align: center; font-weight: 600; font-size: 1.1rem;">
                    A carregar estado...
                </div>
                
                <!-- Independent Date Controls -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                    <!-- Opening Date -->
                    <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                        <label for="open-date" style="display: block; margin-bottom: 0.5rem; color: var(--accent-gold); font-weight: 600;">🚀 Data de Abertura</label>
                        <input type="datetime-local" id="open-date" class="input-field" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem; border-radius: 4px; color: white; width: 100%; margin-bottom: 0.5rem;">
                        <button onclick="saveOpenDate()" class="submit-btn" style="background: var(--accent-gold); color: black; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; width: 100%;">
                            💾 Guardar
                        </button>
                    </div>
                    
                    <!-- Closing Date -->
                    <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                        <label for="close-date" style="display: block; margin-bottom: 0.5rem; color: #dc3545; font-weight: 600;">⏰ Data de Encerramento</label>
                        <input type="datetime-local" id="close-date" class="input-field" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem; border-radius: 4px; color: white; width: 100%; margin-bottom: 0.5rem;">
                        <button onclick="saveCloseDate()" class="submit-btn" style="background: #dc3545; color: white; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; width: 100%;">
                            💾 Guardar
                        </button>
                    </div>
                    
                    <!-- Cancellation Date -->
                    <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                        <label for="cancel-date" style="display: block; margin-bottom: 0.5rem; color: #fd7e14; font-weight: 600;">🚫 Prazo de Cancelamento</label>
                        <input type="datetime-local" id="cancel-date" class="input-field" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem; border-radius: 4px; color: white; width: 100%; margin-bottom: 0.5rem;">
                        <button onclick="saveCancelDate()" class="submit-btn" style="background: #fd7e14; color: white; padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; width: 100%;">
                            💾 Guardar
                        </button>
                    </div>
                </div>
                
                <!-- Manual Control Buttons -->
                <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
                    <h4 style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.9rem;">⚡ Controlo Manual Imediato</h4>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                        <button onclick="openRegistrations()" class="submit-btn" style="background: #28a745; color: white; padding: 0.8rem 2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
                            � ABRIR INSCRIÇÕES
                        </button>
                        <button onclick="closeRegistrations()" class="submit-btn" style="background: #dc3545; color: white; padding: 0.8rem 2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
                            � FECHAR INSCRIÇÕES
                        </button>
                    </div>
                </div>
                
                <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1.5rem; font-style: italic; text-align: center;">
                    Cada data pode ser definida independentemente. As datas são apenas para referência/visualização.
                </p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Candidato / Grupo</th>
                        <th>Data de Inscrição</th>
                        <th>Estado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="registrations-table-body">
                    <!-- Registrations will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
